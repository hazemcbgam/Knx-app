name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install buildozer
      run: |
        pip install buildozer cython
        sudo apt update
        sudo apt install -y openjdk-17-jdk git zip unzip
    
    - name: Build APK
      run: |
        buildozer android debug deploy run 2>&1 | tee build_log.txt
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: knx-app
        path: bin/*.apk

